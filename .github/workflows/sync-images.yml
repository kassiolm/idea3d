name: Sync Images from Google Drive

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sync-images]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Download images and commit
        run: node scripts/download-images.mjs
        env:
          INPUT_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          INPUT_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          INPUT_COMMIT: "true"
